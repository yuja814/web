<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오늘의 집</title>
    <link rel="stylesheet" href="./style/reset.css" />
    <link rel="stylesheet" href="./style/style.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="header" id="header">
        <div class="header_banner">
          <p>
            <span class="header_banner_count">15</span>초 뒤면 사라져요!
            <b>2만원 할인받기</b>
          </p>
        </div>

        <div class="header_inner">
          <div class="header_left">
            <h1 class="logo">
              <a href="#">
                <img src="./img/logo.jpeg" alt="오늘의 집" />
              </a>
            </h1>
            <ul class="header_menu">
              <li><a href="#">커뮤니티</a></li>
              <li><a href="#">쇼핑</a></li>
              <li><a href="#">인테리어/생활</a></li>
            </ul>
          </div>
          <div class="header_right">
            <div class="header_search">
              <label for="search_input" id="search">
                <img src="./img/searchGrayIcon.svg" alt="검색" />
              </label>
              <input type="text" name="search" id="search_input" />
            </div>
            <a href="#"
              ><img src="./img/basketIcon.svg" alt="" class="header_cart"
            /></a>
            <ul class="header_util">
              <li><a href="#">로그인</a></li>
              <li><a href="#">회원가입</a></li>
              <li><a href="#">고객센터</a></li>
            </ul>
            <button type="button" class="header_write_btn">글쓰기</button>
          </div>
        </div>
      </header>
    </div>
    <script src="main.js"></script>
  </body>
</html>
